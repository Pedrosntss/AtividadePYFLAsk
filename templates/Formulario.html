<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="container-cabecalho">
    <h1>Calculadora  🐒</h1>
    <p>Qual calculo deseja fazer?</p>
</header>

    <form action="/processo-calcular", method="POST">
        <div class="campo-numero">
            <label for="numero1">Valor1</label>
            <input type="number" id="numero1" name="numero1" required>
            <br>
            <label for="numero2">Valor2</label>
            <input type="number" id="numero2" name="numero2" required>
        </div>
        <div class="container-botao">
        <input type="submit" name="operacao" value="soma" required>
        <input type="submit" name="operacao" value="subtracao" required>
        <input type="submit" name="operacao" value="multiplicacao" required>
        <input type="submit" name="operacao" value="divisao" required>
        </div>
        <p> {{resultado}} </p>
    </form>
</body>
</html>
